<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <!-- 重要：幅を1400pxに固定し、画面が狭い場合は横スクロール -->
  <meta name="viewport" content="width=1400, initial-scale=1.0">

  <title>履歴書作成</title>

  <!-- Google Fonts（例） -->
  <link href="https://fonts.googleapis.com/css2?family=Istok+Web&display=swap" rel="stylesheet" />

  <!-- 外部CSSの読み込み -->
  <link rel="stylesheet" href="style.css">

  <!-- html2canvas, jsPDF の読み込み -->
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
</head>

<body>

  <!-- 全体コンテナ：幅1400px固定 -->
  <div class="container">

    <!-- 左カラム：フォーム -->
    <div class="left">
      <div class="header-left">
        <h1>
          <span class="smart">Smart</span>
          <span class="dash">-</span>
          <span class="cv">CV</span>
        </h1>
        <h2> 履歴書・職務経歴書自動作成サービス</h2>
      </div>

      <table class="choice-box">
        <td>
          <strong>

          </strong>
        </td>
      </table>

      <table class="first-box">
        <td>
          <strong></strong>
        </td>
      </table>


      <!-- 名前・ふりがな -->
      <div class="section-title">情報</div>
      <div class="row-inline">
        <div class="form-group name-group">
          <label for="input-name">名前</label>
          <input type="text" id="input-name" placeholder="" />
        </div>
        <div class="form-group furigana-group">
          <label for="input-furigana">ふりがな</label>
          <input type="text" id="input-furigana" placeholder="" />
        </div>
      </div>

      <!-- 生年月日 -->
      <div class="birthday-box">
        <label>生年月日</label>
        <div class="birthday-container">
          <div class="year-input-wrap">
            <input id="birth-year" class="year-month-select year-month-input" type="number" inputmode="numeric"
              min="1900" placeholder="--" />
            <div class="year-stepper" aria-hidden="true">
              <button id="birth-year-increase" class="year-step-btn" type="button" aria-label="生年を1つ増やす">▲</button>
              <button id="birth-year-decrease" class="year-step-btn" type="button" aria-label="生年を1つ減らす">▼</button>
            </div>
          </div>
          <span>年</span>
          <select id="birth-month" class="year-month-select">
            <option value="">--</option>
          </select>
          <span>月</span>
          <select id="birth-day" class="day-age-select">
            <option value="">--</option>
          </select>
          <span>日</span>
          <select id="age" class="day-age-select">
            <option value="">--</option>
          </select>
          <span>歳</span>
          <label for="gender" class="gender-label">性別</label>
          <select id="gender" class="gender-select">
            <option value="">--</option>
            <option value="男性">男性</option>
            <option value="女性">女性</option>
            <option value="その他">その他</option>
          </select>
        </div>
      </div>

      <!-- 写真 -->
      <div class="form-group photo-upload-container">
        <label for="input-photo">証明写真</label>
        <div class="photo-placeholder" onclick="document.getElementById('input-photo').click()">
          画像を追加して<br />ください。
        </div>
        <input type="file" id="input-photo" accept="image/*" style="display: none" />
      </div>

      <!-- 住所 -->
      <div class="section-title">住所</div>
      <div class="post-code-group">
        <label for="input-postal-code">郵便番号</label>
        <input type="text" id="input-postal-code" placeholder="" />
      </div>
      <div class="address-furigana-group">
        <label for="input-address-furigana">フリガナ</label>
        <input type="text" id="input-address-furigana" placeholder="" />
      </div>
      <div class="address-group">
        <label for="input-address">現住所</label>
        <input type="text" id="input-address" placeholder="" />
      </div>
      <div class="tell-group">
        <label for="input-phone">電話</label>
        <input type="text" id="input-phone" placeholder="" />
      </div>
      <div class="mail-group">
        <label for="input-email">Email</label>
        <input type="text" id="input-email" placeholder="" />
      </div>

      <!-- 連絡先（現住所以外） -->
      <div class="section-title">連絡先（現住所以外）</div>
      <div class="t-post-code-group">
        <label for="input-alt-postal-code">郵便番号</label>
        <input type="text" id="input-alt-postal-code" />
      </div>
      <div class="t-address-furigana-group">
        <label for="input-alt-address-furigana">フリガナ</label>
        <input type="text" id="input-alt-address-furigana" />
      </div>
      <div class="t-address-group">
        <label for="input-alt-address">住所</label>
        <input type="text" id="input-alt-address" />
      </div>
      <div class="t-tell-group">
        <label for="input-alt-phone">電話</label>
        <input type="text" id="input-alt-phone" />
      </div>
      <div class="t-mail-group">
        <label for="input-alt-email">Email</label>
        <input type="text" id="input-alt-email" placeholder="" />
      </div>

      <!-- 学歴・職歴 -->
      <div class="section-title">学歴・職歴</div>
      <div id="education-container">
        <!-- デフォルト1行目のみ -->
        <div class="row-container">
          <div class="form-inline">
            <div class="year-input-wrap">
              <input class="edu-year year-month-input" type="number" inputmode="numeric" placeholder="----" />
              <div class="year-stepper" aria-hidden="true">
                <button class="year-step-btn edu-year-increase" type="button" tabindex="-1">▲</button>
                <button class="year-step-btn edu-year-decrease" type="button" tabindex="-1">▼</button>
              </div>
            </div>
            <select class="edu-month">
              <option value="">--</option>
            </select>
            <input type="text" class="edu-work" placeholder="例：〇〇大学 入学" />
          </div>
        </div>
      </div>
      <div class="buttons-inline">
        <button type="button" class="btn btn-primary" id="add-education-row">
          ＋ 追加する
        </button>
        <button type="button" class="btn btn-danger" id="remove-education-last">
          － 削除
        </button>
      </div>

      <!-- 免許・資格 -->
      <div class="section-title">免許・資格</div>
      <div id="skill-container">
        <!-- デフォルト1行目のみ -->
        <div class="row-container">
          <div class="form-inline">
            <div class="year-input-wrap">
              <input class="license-year year-month-input" type="number" inputmode="numeric" placeholder="----" />
              <div class="year-stepper" aria-hidden="true">
                <button class="year-step-btn license-year-increase" type="button" tabindex="-1">▲</button>
                <button class="year-step-btn license-year-decrease" type="button" tabindex="-1">▼</button>
              </div>
            </div>
            <select class="license-month">
              <option value="">--</option>
            </select>
            <input type="text" class="skill-history" placeholder="例：普通自動車運転免許" style="text-align: left;" />
          </div>
        </div>
      </div>
      <div class="buttons-inline">
        <button type="button" class="btn btn-primary" id="add-skill-row">
          ＋ 追加する
        </button>
        <button type="button" class="btn btn-danger" id="remove-skill-last">
          － 削除
        </button>
      </div>

      <!-- 志望動機 -->
      <div class="section-title">志望動機</div>
      <div class="form-group">
        <textarea id="input-motivation" placeholder=""></textarea>
      </div>

      <!-- 自己PR -->
      <div class="section-title">自己PR</div>
      <div class="form-group">
        <textarea id="input-pr" placeholder=""></textarea>
      </div>

      <!-- 本人希望 -->
      <div class="section-title">
        本人希望（給与・職種・勤務時間・勤務地 等）
      </div>
      <div class="form-group">
        <textarea id="input-request" placeholder=""></textarea>
      </div>

      <!-- PDF保存ボタン -->
      <div class="pdf-btn-wrapper">
        <button id="pdf-save-btn" class="btn pdf-btn">PDF保存</button>
      </div>
    </div>
    <!-- /left -->


    <!-- 右カラム：プレビュー(複数ページ) -->
    <div class="right" id="preview-right">
      <!-- ズームコントロール -->
      <div class="zoom-controls" id="zoom-controls">
        <button class="zoom-btn" id="zoom-out" title="縮小">−</button>
        <span class="zoom-level" id="zoom-level">100%</span>
        <button class="zoom-btn" id="zoom-in" title="拡大">＋</button>
      </div>
      <div class="resume-pages" id="resume-pages" style="transform-origin: top center;">
        <!-- JSで1ページ目を自動生成 -->
      </div>
    </div>
    <!-- /right -->

  </div><!-- /container -->

  <!-- メインのJavaScriptファイルを読み込み -->
  <script src="script.js"></script>

  <!-- ズーム機能 -->
  <script>
    (function () {
      let zoomLevel = 100;
      const MIN_ZOOM = 30;
      const MAX_ZOOM = 200;
      const STEP = 10;
      const target = document.getElementById('resume-pages');
      const display = document.getElementById('zoom-level');
      const btnIn = document.getElementById('zoom-in');
      const btnOut = document.getElementById('zoom-out');

      function applyZoom() {
        const scale = zoomLevel / 100;
        target.style.transform = 'scale(' + scale + ')';
        display.textContent = zoomLevel + '%';
      }

      btnIn.addEventListener('click', function () {
        if (zoomLevel < MAX_ZOOM) {
          zoomLevel += STEP;
          applyZoom();
        }
      });

      btnOut.addEventListener('click', function () {
        if (zoomLevel > MIN_ZOOM) {
          zoomLevel -= STEP;
          applyZoom();
        }
      });
    })();
  </script>
</body>

</html>
