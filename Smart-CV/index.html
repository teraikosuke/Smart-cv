<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8" />
  <title>Smart-CV | 履歴書・職務経歴書作成サービス</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="完全無料、会員登録不要。履歴書と職務経歴書を最短30秒で作成できるWebサービスです。" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Poppins:wght@400;600;700&display=swap"
    rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="homestyle.css" />
</head>

<body>
  <!-- 背景装飾 -->
  <div class="bg-shape bg-shape-1"></div>
  <div class="bg-shape bg-shape-2"></div>

  <!-- ヘッダー -->
  <header class="header">
    <div class="header-inner">
      <div class="logo">
        <span class="smart">Smart</span>
        <span class="dash">-</span>
        <span class="cv">CV</span>
      </div>
      <p class="subtitle">履歴書・職務経歴書作成ツール</p>
    </div>
  </header>

  <!-- メインコンテンツ -->
  <main class="main-content">
    <div class="container">
      <h2 class="section-title">作成する書類を選んでください</h2>

      <div class="card-container">
        <!-- 履歴書カラム -->
        <a href="resume.html" class="card">
          <div class="card-image">
            <img src="resume.png" alt="履歴書サンプル" />
            <div class="card-overlay">
              <span class="btn-action">履歴書を作成する</span>
            </div>
          </div>
          <div class="card-body">
            <h3>履歴書</h3>
            <p>JIS規格準拠の標準的な履歴書テンプレート</p>
          </div>
        </a>

        <!-- 職務経歴書カラム -->
        <a href="syokumu.html" class="card">
          <div class="card-image">
            <img src="career.png" alt="職務経歴書サンプル" />
            <div class="card-overlay">
              <span class="btn-action">職務経歴書を作成する</span>
            </div>
          </div>
          <div class="card-body">
            <h3>職務経歴書</h3>
            <p>シンプルで見やすい職務経歴書テンプレート</p>
          </div>
        </a>
      </div>
    </div>
  </main>


  <footer class="footer">
    <p>&copy; 2026 Smart-CV. All rights reserved.</p>
  </footer>
</body>

</html>
